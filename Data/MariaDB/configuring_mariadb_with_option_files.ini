## https://mariadb.com/docs/server/server-management/install-and-upgrade-mariadb/configuring-mariadb/configuring-mariadb-with-option-files
## https://mariadb.com/docs/server/server-management/starting-and-stopping-mariadb/mariadbd-options

## Global : [System Windows Directory\my.ini]
## Global : [Windows Directory\my.ini]
## Global : [c:\my.ini]
## Server : [installdir\my.ini]
## Server : [installdir\data\my.ini]
## Server (from MariaDB 10.6) : [%mariadb_home%\my.ini]
## Server : [%mysql_home%\my.ini]

[client_custom_group]
# prompt='(custom prompt for mariadb client)'

[mariadb]
# !include /etc/mysql/dbserver1.cnf
# !includedir /etc/my.cnf.d/
## determine a good value for open_files_limit automatically
autoset_open_files_limit
## enable the slow query log
enable_slow_query_log
## don't produce an error if these options don't exist
# loose_file_key_management_filename = /etc/mysql/encryption/keyfile.enc
# loose_file_key_management_filekey = FILE:/etc/mysql/encryption/keyfile.key
# loose_file_key_management_encryption_algorithm = AES_CTR
## set max_allowed_packet to maximum value
# maximum_max_allowed_packet
## disable external locking for MyISAM
skip_external_locking

[mariadbd]
debug-no-sync
debug_no_sync

[client-server]
## Uncomment these if you want to use a nonstandard connection to MariaDB
# socket=/tmp/mysql.sock
# socket=/tmp/mysql2-dbug.sock
# socket=/tmp/mysql-dbug.sock
socket=C:/Database-to-Excel-VBA/MariaDB/MariaDB/MariaDB10.11/pid/mysql.sock
port=3306

## This will be passed to all mariadb clients
[client]
# password=username:password
plugin-dir=C:/Database-to-Excel-VBA/MariaDB/MariaDB10.11/lib/plugin

## Here are entries for some specific programs
## The following values assume you have at least 32M ram

## The MariaDB server
[mysqld]
temp-pool
port=3306
key_buffer_size=16M
innodb_buffer_pool_size=1012M
loose-innodb_file_per_table
character-set-server=utf8mb4
# datadir=/my/mysqldata
datadir=C:/Database-to-Excel-VBA/MariaDB/data/
tmpdir=C:/Database-to-Excel-VBA/MariaDB/tmp/
# basedir=C:/Database-to-Excel-VBA/MariaDB/
basedir=C:/Database-to-Excel-VBA/MariaDB/
## default-storage-engine=MyISAM
skip-grant-tables
# bind-address=::0

[mariadb]
# datadir=/my/data
datadir=C:/Database-to-Excel-VBA/MariaDB/data/
default-storage-engine=aria
loose-mutex-deadlock-detector
max-connections=20

## Directory for the errmsg.sys file in the language you want to use
# language=/usr/local/share/mysql/english
# language=/my/maria-10.1/sql/share/english/
# language=/my/maria-5.5/sql/share/english/

[mysqldump]
quick
max_allowed_packet=16M

[mysql]
no-auto-rehash
loose-abort-source-on-error

## This is the prefix name to be used for all log, error and replication files
# log-basename=mysqld

## Enable logging by default to help find problems
# general-log
# log-slow-queries
